<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ChatGPT Simple Page</title>
</head>
<body>

    <h1>ChatGPT</h1>

    <div id="chat">
        <p><strong>ChatGPT:</strong> Hello! Ask me anything.</p>
    </div>

    <p>
        <label for="userInput">You:</label>
        <input type="text" id="userInput" placeholder="Type your message here">
        <button id="niiga" onclick="sendMessage()">Send</button>
    </p>

    <script>
        const paragraph = document.getElementById("chat");
        console.log(paragraph.innerText );
        function sendMessage() {
            var input = document.getElementById("userInput");
            var message = input.value.trim();
            if(message === "") return;
            document.body.style.backgroundColor = "blue";

            var chat = document.getElementById("chat");

            // Add user's message
            var userPara = document.createElement("p");
            userPara.innerHTML = "<strong>You:</strong> " + message;
            chat.appendChild(userPara);

            // Generate a dummy response (replace with API call for real ChatGPT)
            var botPara = document.createElement("p");
            botPara.innerHTML = "<strong>ChatGPT:</strong> You said: " + message;
            chat.appendChild(botPara);

            input.value = "";
        }
    </script>

</body>
</html>
